<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABO测试</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top left, #1a1330, #0f0b1f);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #f0e8ff;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(22, 18, 40, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid #6d5dac;
            border-radius: 48px;
            padding: 2.5rem 2.2rem;
            box-shadow: 0 30px 40px -15px black;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 500;
            text-align: center;
            background: linear-gradient(135deg, #e7d9ff, #d4bbff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.2rem;
        }
        .sub {
            text-align: center;
            color: #b7a5f0;
            margin-bottom: 2rem;
            font-style: italic;
            border-bottom: 1px dashed #6d5dac;
            padding-bottom: 0.8rem;
        }
        .progress-area {
            margin: 20px 0 15px;
        }
        .bar-bg {
            background: #2d254a;
            height: 14px;
            border-radius: 30px;
            border: 1px solid #7666b8;
        }
        .bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #b79aff, #e2bdff);
            border-radius: 30px;
            transition: width 0.25s;
            box-shadow: 0 0 15px #cbadff;
        }
        .meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #c7b6ff;
            margin: 8px 0 5px;
        }
        .question-card {
            background: #272041;
            border-radius: 40px;
            padding: 2.2rem 2rem;
            border: 1px solid #9b86e6;
            margin: 20px 0;
        }
        .q-text {
            font-size: 2rem;
            font-weight: 450;
            margin-bottom: 2.5rem;
            line-height: 1.4;
            color: #f7f0ff;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .option-btn {
            background: #322b50;
            border: 2px solid #7161b0;
            border-radius: 60px;
            padding: 1.1rem 1.8rem;
            font-size: 1.2rem;
            font-weight: 500;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 5px 0 #19142b;
            width: 100%;
        }
        .option-btn:hover {
            background: #463d6e;
            border-color: #bfaaff;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #19142b;
        }
        .option-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #19142b;
        }
        .result-screen {
            text-align: center;
            animation: fade 0.6s;
        }
        .gender-large {
            font-size: 4rem;
            font-weight: 600;
            background: linear-gradient(145deg, #ffe1b5, #ffcef5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0.5rem 0 0.2rem;
        }
        .sub-gender {
            font-size: 2rem;
            color: #dcccff;
        }
        .scent-block {
            background: #2f274f;
            border-radius: 80px;
            padding: 1.8rem 2rem;
            margin: 2rem 0;
            border: 2px solid #cbb2ff;
        }
        .scent-label {
            font-size: 1rem;
            letter-spacing: 3px;
            color: #bfabff;
        }
        .scent-value {
            font-size: 2.8rem;
            font-weight: 500;
            color: #fff2fd;
        }
        .reset-btn, .start-btn {
            background: transparent;
            border: 2px solid #c7b2ff;
            color: #e6d6ff;
            font-size: 1.5rem;
            padding: 0.8rem 2.5rem;
            border-radius: 60px;
            margin-top: 2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .reset-btn:hover, .start-btn:hover {
            background: #4a3e7a;
            color: white;
            border-color: #f0daff;
        }
        .note {
            font-size: 0.85rem;
            margin-top: 2rem;
            color: #8f82bb;
        }
        .footer {
            text-align: center;
            color: #6c5d99;
            font-size: 1rem;
            letter-spacing: 1px;
            width: 100%;
            padding: 10px 0;
        }
        /* 开始页面样式 */
        .start-screen {
            text-align: center;
            padding: 1rem 0 2rem;
        }
        .start-icon {
            font-size: 5rem;
            filter: drop-shadow(0 0 20px #b79aff);
            margin: 1rem 0;
        }
        .start-description {
            font-size: 1.4rem;
            color: #d0bdff;
            margin: 1.5rem 0 2rem;
            line-height: 1.6;
        }
        .start-note {
            color: #9e8ed0;
            font-size: 1rem;
            border-top: 1px dashed #6d5dac;
            padding-top: 2rem;
            margin-top: 1rem;
        }
        @keyframes fade {
            0% { opacity: 0; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

              optA: { text: "分析", val: 0 }, 
              optB: { text: "平衡", val: 1 }, 
              optC: { text: "感受", val: 2 } },

              optA: { text: "很少", val: 0 }, 
              optB: { text: "有时", val: 1 }, 
              optC: { text: "经常", val: 2 } },

              optA: { text: "还好", val: 0 }, 
              optB: { text: "喜欢", val: 1 }, 
              optC: { text: "非常喜欢", val: 2 } },
            { id: 100, text: "请凭直觉选择：你内心更认同哪种气质？", 
              optA: { text: "Alpha：领导者，强大独立", val: 0 }, 
              optB: { text: "Beta：平和者，稳定随和", val: 1 }, 
              optC: { text: "Omega：温柔者，敏感细腻", val: 2 } }
        ];

        // 信息素库
        const scentDB = {
            alpha: ['雪松与硝烟', '黑琥珀与龙舌兰', '焚香与朗姆酒', '铁锈与皮革', '胡椒与乌木', '烟草与香根草'],
            beta:  ['亚麻与白茶', '露水与小豆蔻', '书卷与洋甘菊', '青瓜与梨', '米香与棉花', '冷萃与檀木'],
            omega: ['雨后青草与白麝香', '蜂蜜与晚香玉', '香草与牛奶', '栀子与蜜桃', '薰衣草与婴儿爽身粉', '月光与睡莲']
        };

        // 全局变量
        let orderedQuestions = [];
        let currentIdx = 0;
        let userAnswers = [];
        let scoreA = 0, scoreB = 0, scoreO = 0;
        let testEnded = false;
        const realGender = '男';  // 保持原样

        // 构建顺序：第一题id=1，最后一题id=100，中间随机
        function buildOrder() {
            const others = questions.filter(q => q.id !== 1 && q.id !== 100);
            const shuffled = shuffleArray([...others]);
            const first = questions.find(q => q.id === 1);
            const last = questions.find(q => q.id === 100);
            return [first, ...shuffled, last];
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 随机打乱选项并返回数组，每个元素包含text和val
        function shuffleOptions(q) {
            const options = [
                { text: q.optA.text, val: q.optA.val },
                { text: q.optB.text, val: q.optB.val },
                { text: q.optC.text, val: q.optC.val }
            ];
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            return options;
        }

        // 重置测试 (开始新测试)
        function resetTest() {
            orderedQuestions = buildOrder();
            currentIdx = 0;
            userAnswers = [];
            scoreA = 0; scoreB = 0; scoreO = 0;
            testEnded = false;
            renderQuestion();
        }

        // 显示开始页面
        function showStartScreen() {
            document.getElementById('content').innerHTML = `
                <div class="start-screen">
                    <div class="start-icon">⚡🌿</div>
                    <div class="start-description">
                        一百题 · 根据答案可能会跳题<br>
                        请完全凭直觉选择
                    </div>
                    <button class="start-btn" id="startTestBtn">开始测试</button>
                    <div class="start-note">*共一百题，根据答案可能会跳题</div>
                </div>
            `;
            document.getElementById('startTestBtn').addEventListener('click', resetTest);
        }

        // 选项点击处理 (含跳题逻辑)
        function onOption(optVal) {
            if (testEnded) return;

            const q = orderedQuestions[currentIdx];
            userAnswers.push({ qId: q.id, option: optVal });

            // 加分：optVal 0/1/2 对应 Alpha/Beta/Omega
            if (optVal === 0) scoreA += 1;
            else if (optVal === 1) scoreB += 1;
            else if (optVal === 2) scoreO += 1;

            // 跳题逻辑：随机跳0-3题，但不跳过最后一题
            let skip = 0;
            if (currentIdx < orderedQuestions.length - 1) {
                const maxSkip = Math.min(3, orderedQuestions.length - 1 - currentIdx);
                skip = Math.floor(Math.random() * (maxSkip + 1));
            }
            let nextIdx = currentIdx + 1 + skip;
            if (nextIdx >= orderedQuestions.length) nextIdx = orderedQuestions.length - 1;

            currentIdx = nextIdx;

            const hasAnsweredLast = userAnswers.some(a => a.qId === 100);
            if (currentIdx >= orderedQuestions.length - 1 && !hasAnsweredLast) {
                currentIdx = orderedQuestions.length - 1;
                renderQuestion();
            } else if (hasAnsweredLast) {
                finishTest();
            } else {
                renderQuestion();
            }
        }

        function finishTest() {
            testEnded = true;
            let second = 'Omega';
            if (scoreA > scoreB && scoreA > scoreO) second = 'Alpha';
            else if (scoreB > scoreA && scoreB > scoreO) second = 'Beta';
            else if (scoreO > scoreA && scoreO > scoreB) second = 'Omega';
            else second = 'Omega'; // 平局默认Omega

            const scents = scentDB[second.toLowerCase()];
            const scent = scents[Math.floor(Math.random() * scents.length)];
            const full = `${realGender} ${second}`;

            document.getElementById('content').innerHTML = `
                <div class="result-screen">
                    <div class="gender-large">${full}</div>
                    <div class="sub-gender">${second} · 信息素</div>
                    <div class="scent-block">
                        <div class="scent-label">专属味道</div>
                        <div class="scent-value">${scent}</div>
                    </div>
                    <button class="reset-btn" id="restartTest">⟳ 重新测试</button>
                    <div class="note">作答 ${userAnswers.length} 题 · 选项顺序随机</div>
                </div>
            `;
            document.getElementById('restartTest').addEventListener('click', showStartScreen);
        }

        function renderQuestion() {
            if (testEnded) return;
            const q = orderedQuestions[currentIdx];
            const progress = (currentIdx / (orderedQuestions.length - 1)) * 100;
            const shuffledOpts = shuffleOptions(q);

            const html = `
                <div class="progress-area">
                    <div class="bar-bg"><div class="bar-fill" style="width:${progress}%;"></div></div>
                    <div class="meta">
                        <span>第 ${currentIdx+1} / ${orderedQuestions.length} 题</span>
                        <span>⚡ 直觉选择</span>
                    </div>
                </div>
                <div class="question-card">
                    <div class="q-text">${q.text}</div>
                    <div class="options" id="optionsContainer">
                        <button class="option-btn" data-val="${shuffledOpts[0].val}">${shuffledOpts[0].text}</button>
                        <button class="option-btn" data-val="${shuffledOpts[1].val}">${shuffledOpts[1].text}</button>
                        <button class="option-btn" data-val="${shuffledOpts[2].val}">${shuffledOpts[2].text}</button>
                    </div>
                </div>
                <div class="note">*共一百题，根据答案可能会跳题</div>
            `;
            document.getElementById('content').innerHTML = html;

            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const val = parseInt(e.currentTarget.dataset.val, 10);
                    onOption(val);
                });
            });
        }

        // 初始化：显示开始页面
        window.addEventListener('load', showStartScreen);
    })();
</script>
