<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABO性别测试</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 开始界面 -->
        <div id="start-container" class="screen active">
            <h1>ABO性别测试</h1>
            <p class="subtitle">探索你的第二性别与信息素</p>
            <div class="choice-buttons">
                <button class="choice-btn" onclick="startQuiz('A')">A. 只测试第二性别（ABO）</button>
                <button class="choice-btn" onclick="startQuiz('B')">B. 测试第一+第二性别（男/女+ABO）</button>
            </div>
        </div>

        <!-- 测试界面 -->
        <div id="quiz-container" class="screen">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <p class="question-count">题目 <span id="current-q">1</span>/52</p>
            <h2 id="question-text" class="question"></h2>
            <div id="options-container" class="options"></div>
            <button id="next-btn" class="next-btn" onclick="nextQuestion()" disabled>下一题</button>
        </div>

        <!-- 结果界面 -->
        <div id="result-container" class="screen">
            <h1>测试结果</h1>
            <div class="result-card">
                <p class="result-label">你的性别是</p>
                <h2 id="gender-result" class="gender-result"></h2>
                <p class="result-label">信息素类型</p>
                <h3 id="pheromone-result" class="pheromone-result"></h3>
                <div class="analysis">
                    <h3>完整分析</h3>
                    <p id="analysis-text"></p>
                </div>
            </div>
            <button class="restart-btn" onclick="resetQuiz()">重新测试</button>
        </div>
    </div>

    <footer>
        <p>参考文章：<a href="https://www.jjwxc.net/onebook.php?novelid=9709335&chapterid=78" target="_blank">ABO世界观的详细介绍</a> | 作者：ZZX</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
