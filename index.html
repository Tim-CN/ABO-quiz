<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ABO六性别·百题深度解析</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter','Segoe UI',Roboto,sans-serif;background:radial-gradient(circle at top left,#1a1035,#0b0716);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;color:#ece4ff}.card{max-width:1000px;width:100%;background:rgba(20,15,35,0.9);backdrop-filter:blur(14px);border:1px solid #7a66c9;border-radius:48px;padding:2rem;box-shadow:0 30px 45px -20px #000;margin-bottom:25px}.title{font-size:2.5rem;font-weight:600;text-align:center;background:linear-gradient(145deg,#ffdd9a,#e2b9ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}.sub{text-align:center;color:#b3a0f0;font-style:italic;border-bottom:1px dashed #6a5cb0;padding-bottom:12px;margin-bottom:20px}.progress-bar{background:#2e2649;height:14px;border-radius:30px;border:1px solid #7a6ac0;margin:15px 0}.progress-fill{width:0%;height:100%;background:linear-gradient(90deg,#c7aaff,#f0c6ff);border-radius:30px;transition:.25s;box-shadow:0 0 18px #dbbaff}.info-row{display:flex;justify-content:space-between;color:#c7b6ff;font-size:.9rem;margin:8px 0}.question-card{background:#292243;border-radius:40px;padding:2rem;border:1px solid #9f88ed;margin:18px 0}.question-text{font-size:1.7rem;font-weight:450;margin-bottom:2.2rem;line-height:1.4;color:#f7efff}.options{display:flex;flex-direction:column;gap:1rem}.option-btn{background:#352e55;border:2px solid #7c6ac2;border-radius:60px;padding:1rem 1.8rem;font-size:1.2rem;font-weight:500;color:#fff;text-align:left;cursor:pointer;transition:0.1s;box-shadow:0 5px 0 #1e1736;width:100%}.option-btn:hover{background:#4a3f73;border-color:#cfb6ff;transform:translateY(-2px);box-shadow:0 7px 0 #1e1736}.option-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #1e1736}.result-screen{text-align:center;animation:fadeIn .5s}.gender-main{font-size:4rem;font-weight:700;background:linear-gradient(145deg,#ffeac2,#ffd5f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:.2rem 0}.sub-gender{font-size:2rem;color:#d6c0ff}.pheromone-block{background:#2f274f;border-radius:80px;padding:1.8rem;margin:2rem 0;border:2px solid #d0b5ff}.pheromone-label{font-size:1rem;letter-spacing:3px;color:#c4adff}.pheromone-value{font-size:2.5rem;font-weight:500;color:#fff6fd}.report-table{width:100%;border-collapse:collapse;margin:25px 0 10px;background:#1f193a;border-radius:40px;overflow:hidden;border:1px solid #937fdb;color:#e2d5ff}.report-table th{background:#362e59;padding:15px 8px;font-weight:600;font-size:1rem;color:#ffedb0;border-bottom:2px solid #aa99ee}.report-table td{padding:12px 8px;border-bottom:1px solid #4f4185;text-align:center;font-size:.95rem}.report-table tr:last-child td{border-bottom:none}.report-table td:first-child{border-right:1px solid #4f4185;font-weight:600;color:#f0daff}.reset-btn,.start-btn{background:0 0;border:2px solid #d3bbff;color:#f0e2ff;font-size:1.5rem;padding:.8rem 2.8rem;border-radius:60px;margin:1.5rem 0 .5rem;cursor:pointer;transition:.2s}.reset-btn:hover,.start-btn:hover{background:#52458b;color:#fff;border-color:#ffe6ff}.footnote{font-size:.85rem;margin-top:1.5rem;color:#8a79c2}.footer{text-align:center;color:#6a5a9c;font-size:1rem;width:100%;padding:8px 0}.start-screen{text-align:center;padding:1.5rem 0}.start-icon{font-size:5rem;filter:drop-shadow(0 0 20px #c5a6ff);margin:1rem}.start-desc{font-size:1.3rem;color:#d9c5ff;margin:1.5rem 0;line-height:1.6}.start-foot{border-top:1px dashed #6f5cb4;padding-top:1.8rem;margin-top:1.5rem;color:#9f8bd6}@keyframes fadeIn{0%{opacity:0;transform:scale(.97)}100%{opacity:1;transform:scale(1)}}</style></head><body><div class="card" id="appContainer"><h1 class="title">ABO·六性图谱</h1><div class="sub">100题·同时判定第一性别(男/女)与第二性别(ABO)·基于经典设定</div><div id="dynamicContent"></div></div><div class="footer">© 2026 世界观·六性别解析</div><script>(function(){const questions=[{id:1,text:"在聚会中你更容易被哪种氛围吸引？",options:[{text:"热闹的中心，喜欢成为焦点",alpha:3,beta:1,omega:0,male:2,female:0},{text:"轻松的小圈子，自在交谈",alpha:1,beta:3,omega:1,male:1,female:1},{text:"安静的角落，观察他人",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:2,text:"闻到他人身上的微弱气味，你的反应是？",options:[{text:"能察觉但不受影响，甚至可以压制",alpha:3,beta:1,omega:0,male:2,female:1},{text:"没什么特别感觉，偶尔会注意",alpha:1,beta:3,omega:1,male:1,female:1},{text:"容易被影响，甚至改变情绪/生理状态",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:3,text:"看到在意的人受委屈，你的第一反应是？",options:[{text:"立刻出头，强势保护/反击",alpha:3,beta:1,omega:0,male:3,female:2},{text:"先安抚情绪，再理性解决",alpha:1,beta:3,omega:1,male:1,female:1},{text:"和对方一起难过，希望有人来保护你们",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:4,text:"面对强烈的生理/情绪波动（如焦虑/渴望），你会？",options:[{text:"强行压制，靠意志力控制",alpha:3,beta:1,omega:0,male:2,female:1},{text:"自然调节，慢慢平复",alpha:1,beta:3,omega:1,male:1,female:1},{text:"需要他人安抚/陪伴才能缓解",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:5,text:"朋友们通常觉得你？",options:[{text:"有魄力，天生的领导者",alpha:3,beta:1,omega:0,male:2,female:1},{text:"随和稳重，好相处",alpha:1,beta:3,omega:1,male:1,female:1},{text:"敏感细腻，善解人意",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:6,text:"对于被标记这件事，你的看法是？",options:[{text:"反感，只愿标记他人",alpha:3,beta:1,omega:0,male:3,female:2},{text:"无所谓，标记与否都能接受",alpha:1,beta:3,omega:1,male:1,female:1},{text:"渴望被专属标记，有归属感",alpha:0,beta:1,omega:3,male:1,female:3}]},{id:7,text:"压力大时，你的本能反应是？",options:[{text:"更专注，想掌控局面",alpha:3,beta:1,omega:0,male:2,female:1},{text:"冷静分析，找解决办法",alpha:1,beta:3,omega:1,male:1,female:1},{text:"想逃避或找信任的人依靠",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:8,text:"你对自己的信息素气场认知是？",options:[{text:"强烈，能影响周围人",alpha:3,beta:1,omega:0,male:3,female:2},{text:"温和，不引人注意",alpha:1,beta:3,omega:1,male:1,female:1},{text:"柔和，容易吸引他人靠近",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:9,text:"在亲密关系中，你更倾向于？",options:[{text:"主导关系，保护对方",alpha:3,beta:1,omega:0,male:3,female:2},{text:"平等相处，互相扶持",alpha:1,beta:3,omega:1,male:1,female:1},{text:"被照顾，依赖对方",alpha:0,beta:1,omega:3,male:1,female:3}]},{id:10,text:"易感期/发情期来临时，你会？",options:[{text:"独自隔离，避免失控",alpha:3,beta:1,omega:0,male:2,female:1},{text:"正常生活，用抑制剂调节",alpha:1,beta:3,omega:1,male:1,female:1},{text:"寻找伴侣安抚，无法独自应对",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:11,text:"你容易察觉他人隐藏的情绪吗？",options:[{text:"不太注意，专注自己的目标",alpha:3,beta:1,omega:0,male:1,female:0},{text:"能感觉到但不受影响",alpha:1,beta:3,omega:1,male:1,female:1},{text:"很敏感，能精准捕捉",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:12,text:"面对挑衅，你的反应是？",options:[{text:"直接反击，展现强势",alpha:3,beta:1,omega:0,male:3,female:2},{text:"无视或理性沟通",alpha:1,beta:3,omega:1,male:1,female:1},{text:"感到害怕，想躲开",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:13,text:"你理想中的信息素匹配是？",options:[{text:"能被我压制的",alpha:3,beta:1,omega:0,male:2,female:1},{text:"互相中和的",alpha:1,beta:3,omega:1,male:1,female:1},{text:"能安抚我的",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:14,text:"在人群中待久了，你会？",options:[{text:"更兴奋，能量提升",alpha:3,beta:1,omega:0,male:2,female:1},{text:"没感觉，适度就好",alpha:1,beta:3,omega:1,male:1,female:1},{text:"感到疲惫，想独处",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:15,text:"你对抑制剂的态度是？",options:[{text:"很少用，能自控",alpha:3,beta:1,omega:0,male:2,female:1},{text:"偶尔用，按需调节",alpha:1,beta:3,omega:1,male:1,female:1},{text:"经常用，无法离开",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:16,text:"面对竞争，你会？",options:[{text:"主动出击，一定要赢",alpha:3,beta:1,omega:0,male:2,female:1},{text:"顺其自然，尽力就好",alpha:1,beta:3,omega:1,male:1,female:1},{text:"避开竞争，不想冲突",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:17,text:"你的生理周期（模拟）特点是？",options:[{text:"易感期，占有欲强",alpha:3,beta:1,omega:0,male:3,female:2},{text:"无明显周期，稳定",alpha:1,beta:3,omega:1,male:1,female:1},{text:"发情期，需要安抚",alpha:0,beta:1,omega:3,male:1,female:3}]},{id:18,text:"闻到让你安心的气味，你会？",options:[{text:"记住但不表现，保持冷静",alpha:3,beta:1,omega:0,male:2,female:1},{text:"觉得舒服而已",alpha:1,beta:3,omega:1,male:1,female:1},{text:"想靠近，依赖这种气味",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:19,text:"你更想成为哪种信息素类型？",options:[{text:"压制型（Alpha）",alpha:3,beta:1,omega:0,male:2,female:1},{text:"中和型（Beta）",alpha:1,beta:3,omega:1,male:1,female:1},{text:"安抚型（Omega）",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:20,text:"面对弱者，你的态度是？",options:[{text:"保护，但保持距离",alpha:3,beta:1,omega:0,male:3,female:2},{text:"平等对待，提供帮助",alpha:1,beta:3,omega:1,male:1,female:1},{text:"心疼，想照顾/被照顾",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:21,text:"你更偏好哪种环境？",options:[{text:"掌控感强的封闭空间（如办公室/书房）",alpha:3,beta:1,omega:0,male:2,female:1},{text:"舒适的公共空间（如咖啡馆/公园）",alpha:1,beta:3,omega:1,male:1,female:1},{text:"温馨的私密空间（如卧室/阳台）",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:22,text:"他人对你的信息素评价更接近？",options:[{text:"有压迫感，不敢靠近",alpha:3,beta:1,omega:0,male:3,female:2},{text:"没感觉，很普通",alpha:1,beta:3,omega:1,male:1,female:1},{text:"很舒服，想靠近",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:23,text:"你会主动标记在意的人吗？",options:[{text:"会，明确宣示归属",alpha:3,beta:1,omega:0,male:3,female:2},{text:"看情况，顺其自然",alpha:1,beta:3,omega:1,male:1,female:1},{text:"不会，希望被对方标记",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:24,text:"情绪失控时，你的表现是？",options:[{text:"暴躁，有攻击性",alpha:3,beta:1,omega:0,male:3,female:2},{text:"平静，自我调节",alpha:1,beta:3,omega:1,male:1,female:1},{text:"脆弱，需要安慰",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:25,text:"你对领地的认知是？",options:[{text:"有强烈领地意识，不容侵犯",alpha:3,beta:1,omega:0,male:3,female:2},{text:"无所谓，只要不打扰我",alpha:1,beta:3,omega:1,male:1,female:1},{text:"喜欢和在意的人共享领地",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:26,text:"你更擅长哪种社交方式？",options:[{text:"主导对话，掌控节奏",alpha:3,beta:1,omega:0,male:2,female:1},{text:"倾听为主，适时回应",alpha:1,beta:3,omega:1,male:1,female:1},{text:"被动参与，依赖引导",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:27,text:"闻到陌生的强烈气味，你会？",options:[{text:"反感，试图压制",alpha:3,beta:1,omega:0,male:2,female:1},{text:"无感，正常忽略",alpha:1,beta:3,omega:1,male:1,female:1},{text:"好奇，想靠近了解",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:28,text:"你对“专属”的理解是？",options:[{text:"我专属他人，而非他人专属我",alpha:3,beta:1,omega:0,male:3,female:2},{text:"互相专属，平等尊重",alpha:1,beta:3,omega:1,male:1,female:1},{text:"被他人专属，感到安心",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:29,text:"你更倾向于哪种决策方式？",options:[{text:"快速决策，承担责任",alpha:3,beta:1,omega:0,male:2,female:1},{text:"谨慎决策，参考意见",alpha:1,beta:3,omega:1,male:1,female:1},{text:"依赖他人，不愿决策",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:30,text:"你的睡眠习惯更接近？",options:[{text:"浅眠，易醒，警惕性高",alpha:3,beta:1,omega:0,male:2,female:1},{text:"规律睡眠，不易醒",alpha:1,beta:3,omega:1,male:1,female:1},{text:"深眠，依赖安全感，易多梦",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:31,text:"面对突发状况，你会？",options:[{text:"立刻应对，掌控局面",alpha:3,beta:1,omega:0,male:3,female:2},{text:"冷静分析，逐步解决",alpha:1,beta:3,omega:1,male:1,female:1},{text:"慌乱，寻求帮助",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:32,text:"你对疼痛的耐受度？",options:[{text:"高，能忍受强烈疼痛",alpha:3,beta:1,omega:0,male:3,female:2},{text:"中等，正常耐受",alpha:1,beta:3,omega:1,male:1,female:1},{text:"低，轻微疼痛也难以忍受",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:33,text:"你更偏好哪种运动？",options:[{text:"对抗性运动（如拳击/篮球）",alpha:3,beta:1,omega:0,male:3,female:2},{text:"休闲运动（如瑜伽/慢跑）",alpha:1,beta:3,omega:1,male:1,female:1},{text:"非运动型（如散步/静坐）",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:34,text:"你对他人的依赖程度？",options:[{text:"低，几乎不依赖他人",alpha:3,beta:1,omega:0,male:3,female:2},{text:"中等，适度依赖",alpha:1,beta:3,omega:1,male:1,female:1},{text:"高，很依赖亲近的人",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:35,text:"你更容易被哪种特质吸引？",options:[{text:"强大、独立、有掌控力",alpha:3,beta:1,omega:0,male:2,female:1},{text:"温和、稳定、易相处",alpha:1,beta:3,omega:1,male:1,female:1},{text:"温柔、细腻、需要保护",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:36,text:"你对“规则”的态度是？",options:[{text:"制定规则，而非遵守",alpha:3,beta:1,omega:0,male:3,female:2},{text:"遵守规则，维持秩序",alpha:1,beta:3,omega:1,male:1,female:1},{text:"适应规则，寻求保护",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:37,text:"你的表达风格更接近？",options:[{text:"直接、强势、不绕弯",alpha:3,beta:1,omega:0,male:3,female:2},{text:"委婉、适中、留余地",alpha:1,beta:3,omega:1,male:1,female:1},{text:"含蓄、温柔、怕冲突",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:38,text:"你对孤独的感受是？",options:[{text:"享受孤独，独处更高效",alpha:3,beta:1,omega:0,male:3,female:2},{text:"无所谓，独处或社交均可",alpha:1,beta:3,omega:1,male:1,female:1},{text:"害怕孤独，需要陪伴",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:39,text:"你更在意哪种需求？",options:[{text:"成就需求，渴望成功",alpha:3,beta:1,omega:0,male:2,female:1},{text:"安全需求，渴望稳定",alpha:1,beta:3,omega:1,male:1,female:1},{text:"情感需求，渴望被爱",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:40,text:"你对“被需要”的感受是？",options:[{text:"习惯被需要，视为责任",alpha:3,beta:1,omega:0,male:3,female:2},{text:"偶尔被需要，感觉良好",alpha:1,beta:3,omega:1,male:1,female:1},{text:"希望被需要，证明价值",alpha:0,beta:1,omega:3,male:0,female:3}]},{id:41,text:"你处理冲突的方式是？",options:[{text:"直面冲突，解决问题",alpha:3,beta:1,omega:0,male:3,female:2},{text:"调和冲突，求同存异",alpha:1,beta:3,omega:1,male:1,female:1},{text:"回避冲突，避免争吵",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:42,text:"你的注意力特点是？",options:[{text:"专注，不易被干扰",alpha:3,beta:1,omega:0,male:2,female:1},{text:"适中，可自主调节",alpha:1,beta:3,omega:1,male:1,female:1},{text:"易分散，受环境影响",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:43,text:"你对未来的规划是？",options:[{text:"详细规划，掌控未来",alpha:3,beta:1,omega:0,male:2,female:1},{text:"大致规划，灵活调整",alpha:1,beta:3,omega:1,male:1,female:1},{text:"很少规划，顺其自然",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:44,text:"你更偏好哪种天气？",options:[{text:"暴雨/烈日（强烈型）",alpha:3,beta:1,omega:0,male:2,female:1},{text:"多云/微风（温和型）",alpha:1,beta:3,omega:1,male:1,female:1},{text:"细雨/薄雾（柔和型）",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:45,text:"你对“权威”的态度是？",options:[{text:"挑战权威，成为权威",alpha:3,beta:1,omega:0,male:3,female:2},{text:"尊重权威，遵守规则",alpha:1,beta:3,omega:1,male:1,female:1},{text:"依赖权威，寻求保护",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:46,text:"你的消费风格是？",options:[{text:"果断，买贵的，买对的",alpha:3,beta:1,omega:0,male:2,female:1},{text:"理性，货比三家，按需购买",alpha:1,beta:3,omega:1,male:1,female:1},{text:"犹豫，依赖建议，易冲动",alpha:0,beta:1,omega:3,male:0,female:2}]},{id:47,text:"你对“改变”的接受度？",options:[{text:"主动改变，适应力强",alpha:3,beta:1,omega:0,male:2,female:1},{text:"适度改变，循序渐进",alpha:1,beta:3,omega:1,male:1, ondGender='Alpha';}else if(maxScore===omegaScore&&omegaScore>betaScore){secondGender='Omega';}}let firstGender=scores.male>scores.female?'男':'女';const pheromoneKey=firstGender+secondGender;const pheromoneList=pheromoneDB[pheromoneKey];const randomPheromone=pheromoneList[Math.floor(Math.random()*pheromoneList.length)];const resultHTML=`<div class="result-screen"><h2 class="gender-main">${firstGender}${secondGender}</h2><div class="sub-gender">信息素味道</div><div class="pheromone-block"><div class="pheromone-label">PHEROMONE</div><div class="pheromone-value">${randomPheromone}</div></div><table class="report-table"><tr><th>维度</th><th>分值</th><th>特质倾向</th></tr><tr><td>第二性别</td><td>A:${alphaScore} | B:${betaScore} | O:${omegaScore}</td><td>${secondGender}</td></tr><tr><td>第一性别</td><td>男:${scores.male} | 女:${scores.female}</td><td>${firstGender}</td></tr></table><button class="reset-btn" id="resetTestBtn">重新测试</button></div>`;document.getElementById('dynamicContent').innerHTML=resultHTML;document.getElementById('resetTestBtn').addEventListener('click',resetTest);}function showQuestion(){if(currentIndex>=shuffledQuestions.length){completeTest();return;}const q=shuffledQuestions[currentIndex];const progressPercent=((currentIndex+1)/shuffledQuestions.length)*100;let optionsHTML='';q.options.forEach((opt,idx)=>{optionsHTML+=`<button class="option-btn" data-idx="${idx}">${opt.text}</button>`;});const questionHTML=`<div class="info-row"><span>题目 ${currentIndex+1} / ${shuffledQuestions.length}</span><span>ID: ${q.id}</span></div><div class="progress-bar"><div class="progress-fill" style="width: ${progressPercent}%"></div></div><div class="question-card"><div class="question-text">${q.text}</div><div class="options">${optionsHTML}</div></div>`;document.getElementById('dynamicContent').innerHTML=questionHTML;document.querySelectorAll('.option-btn').forEach((btn,idx)=>{btn.addEventListener('click',()=>{selectOption(q.options[idx]);});});}document.addEventListener('DOMContentLoaded',()=
