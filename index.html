iv class="kai_shi_ping_mu"><div class="kai_shi_tu_biao">⚡🌿</div><div class="kai_shi_miao_shu">一百题 · 根据答案可能会跳题<br>请完全凭直觉选择</div><button class="kai_shi_an_niu" id="kai_shi_ce_shi_an_niu">开始测试</button><div class="kai_shi_bei_zhu">*共一百题，根据答案可能会跳题</div></div>`;document.getElementById('kai_shi_ce_shi_an_niu').addEventListener('click',chong_zhi_ce_shi)}function dian_ji_xuan_xiang(xuan_xiang_zhi){if(ce_shi_jie_shu)return;const wen_ti_can_shu=you_xu_wen_ti[dang_qian_suo_yin];yong_hu_da_an.push({wen_ti_bian_hao:wen_ti_can_shu.bian_hao,xuan_xiang_zhi:xuan_xiang_zhi});if(xuan_xiang_zhi===0)fen_shu_alpha+=1;else if(xuan_xiang_zhi===1)fen_shu_beta+=1;else if(xuan_xiang_zhi===2)fen_shu_omega+=1;let tiao_guo=0;if(dang_qian_suo_yin<you_xu_wen_ti.length-1){const zui_da_tiao_guo=Math.min(3,you_xu_wen_ti.length-1-dang_qian_suo_yin);tiao_guo=Math.floor(Math.random()*(zui_da_tiao_guo+1))}let xia_yi_suo_yin=dang_qian_suo_yin+1+tiao_guo;if(xia_yi_suo_yin>=you_xu_wen_ti.length)xia_yi_suo_yin=you_xu_wen_ti.length-1;dang_qian_suo_yin=xia_yi_suo_yin;const shi_fou_da_wan_zui_hou=yong_hu_da_an.some(a=>a.wen_ti_bian_hao===100);if(dang_qian_suo_yin>=you_xu_wen_ti.length-1&&!shi_fou_da_wan_zui_hou){dang_qian_suo_yin=you_xu_wen_ti.length-1;xian_shi_wen_ti()}else if(shi_fou_da_wan_zui_hou){wan_cheng_ce_shi()}else{xian_shi_wen_ti()}}function wan_cheng_ce_shi(){ce_shi_jie_shu=true;let jie_guo='Omega';if(fen_shu_alpha>fen_shu_beta&&fen_shu_alpha>fen_shu_omega)jie_guo='Alpha';else if(fen_shu_beta>fen_shu_alpha&&fen_shu_beta>fen_shu_omega)jie_guo='Beta';else if(fen_shu_omega>fen_shu_alpha&&fen_shu_omega>fen_shu_beta)jie_guo='Omega';else jie_guo='Omega';const xiang_wei_shu_zu=xin_xi_su_ku[jie_guo.toLowerCase()];const xiang_wei=xiang_wei_shu_zu[Math.floor(Math.random()*xiang_wei_shu_zu.length)];const wan_zheng=`${zhen_shi_xing_bie} ${jie_guo}`;document.getElementById('nei_rong').innerHTML=`<div class="jie_guo_ping_mu"><div class="xing_bie_da">${wan_zheng}</div><div class="fu_xing_bie">${jie_guo} · 信息素</div><div class="xin_xi_su_kuai"><div class="xin_xi_su_biao_qian">专属味道</div><div class="xin_xi_su_zhi">${xiang_wei}</div></div><button class="chong_zhi_an_niu" id="chong_xin_ce_shi">⟳ 重新测试</button><div class="bei_zhu">作答 ${yong_hu_da_an.length} 题 · 选项顺序随机</div></div>`;document.getElementById('chong_xin_ce_shi').addEventListener('click',xian_shi_kai_shi_ping_mu)}function xian_shi_wen_ti(){if(ce_shi_jie_shu)return;const wen_ti_can_shu=you_xu_wen_ti[dang_qian_suo_yin];const jin_du=(dang_qian_suo_yin/(you_xu_wen_ti.length-1))*100;const luan_xu_xuan_xiang=da_luan_xuan_xiang(wen_ti_can_shu);const html_str=`<div class="jin_du_qu_yu"><div class="tiao_bei_jing"><div class="tiao_tian_chong" style="width:${jin_du}%;"></div></div><div class="yuan_xin_xi"><span>第 ${dang_qian_suo_yin+1} / ${you_xu_wen_ti.length} 题</span><span>⚡ 直觉选择</span></div></div><div class="wen_ti_ka_pian"><div class="wen_ti_wen_ben">${wen_ti_can_shu.wen_ben}</div><div class="xuan_xiang" id="xuan_xiang_rong_qi"><button class="xuan_xiang_an_niu" data-zhi="${luan_xu_xuan_xiang[0].zhi}">${luan_xu_xuan_xiang[0].wen_ben}</button><button class="xuan_xiang_an_niu" data-zhi="${luan_xu_xuan_xiang[1].zhi}">${luan_xu_xuan_xiang[1].wen_ben}</button><button class="xuan_xiang_an_niu" data-zhi="${luan_xu_xuan_xiang[2].zhi}">${luan_xu_xuan_xiang[2].wen_ben}</button></div></div><div class="bei_zhu">*共一百题，根据答案可能会跳题</div>`;document.getElementById('nei_rong').innerHTML=html_str;document.querySelectorAll('.xuan_xiang_an_niu').forEach(an_niu=>{an_niu.addEventListener('click',(shi_jian)=>{const zhi=parseInt(shi_jian.currentTarget.dataset.zhi,10);dian_ji_xuan_xiang(zhi)})})}window.addEventListener('load',xian_shi_kai_shi_ping_mu);})();</script></body></html>
